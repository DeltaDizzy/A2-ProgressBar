<!DOCTYPE html>
<html lang="">
  <head>
    <meta charset="utf-8">
    <link rel="icon" type="image/png" href="favicon/favicon-96x96.png?v=20260402" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="favicon/favicon.svg?v=20260402" />
    <link rel="shortcut icon" href="favicon/favicon.ico?v=20260402" />
    <link rel="apple-touch-icon" sizes="180x180" href="favicon/apple-touch-icon.png?v=20260402" />
    <link rel="manifest" href="favicon/site.webmanifest?v=20260402" />
    <title>Artemis II MET</title>
    <link rel="stylesheet" href="dashboard.css">
  </head>
  <body>
    <div id="container">
      <h1>Artemis II Mission Elapsed Time</h1>
      
      <div id="times">
        <h3 id="local">Local Time:</h3>
        <h3 id="met">Mission Elapsed Time:</h3>
        <h3 id="cursor-coords">Cursor: 0, 0</h3>
        <a href="/schedule.html" style="font-size:larger; font-weight: bold; text-align: right;">View Full Mission Schedule</a>
      </div>
      <h2>Mission Timeline</h2>
      <div id="events">

      </div>
      <div id="header-container">
        <img id="header-image" src="media/header.png" alt="Timeline Header" />
      </div>
      <div id="timeline-container">
        <img id="timeline-image" alt="Timeline" />
        <div id="timeline-bar"></div>
      </div>
      <div id="streams">
        <iframe width="560" height="315" 
                src="https://www.youtube-nocookie.com/embed/m3kR2KK8TEs" title="YouTube video player" 
                frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; 
                picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen>
        </iframe>
      </div>
    </div>
    <script src="dashboard.js"></script>
  </body>
</html>
