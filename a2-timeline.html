<!DOCTYPE html>
<html lang="">
  <head>
    <meta charset="utf-8">
    <link rel="icon" type="image/png" href="/favicon-96x96.png?v=20260402" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=20260402" />
    <link rel="shortcut icon" href="/favicon.ico?v=20260402" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=20260402" />
    <link rel="manifest" href="/site.webmanifest?v=20260402" />
    <title>Artemis II MET</title>
    <style>
      #timeline-container {
        position: relative;
        width: 100%;
        max-width: 100vw;
        overflow: hidden;
        border: 1px solid #ccc;
        background: #111;
      }

      #header-container {
        position: relative;
        width: 100%;
        text-align: center;
        overflow: hidden;
      }

      #header-image {
        max-width: 100%;
        height: auto;
        display: block;
        margin: 0 auto;
      }

      #timeline-image {
        position: relative;
        width: 100%;
        height: auto;
        display: block;
      }

      #timeline-bar {
        position: absolute;
        top: 0;
        bottom: 0;
        width: 3px;
        background: red;
        left: 0;
        transform: translateX(-50%);
        z-index: 10;
      }

      #cursor-coords {
        position: fixed;
        top: 8px;
        left: 8px;
        z-index: 20;
        background: rgba(0,0,0,0.66);
        color: #fff;
        padding: 4px 8px;
        border-radius: 4px;
        font-family: monospace;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="container">
      <h1>Artemis II Mission Elapsed Time</h1>
      
      <div id="times">
        <h3 id="local">Local Time:</h3>
        <h3 id="met">Mission Elapsed Time:</h3>
        <h3 id="cursor-coords">Cursor: 0, 0</h3>
      </div>
      <h2>Mission Timeline</h2>
      <div id="events">
        <h3 id="tli">Trans-Lunar Injection (TLI):</h3>
      </div>
      <div id="header-container">
        <img id="header-image" src="media/header.png" alt="Timeline Header" />
      </div>
      <div id="timeline-container">
        <img id="timeline-image" alt="Timeline" />
        <div id="timeline-bar"></div>
      </div>
      
    </div>
    
    <script>
      // do initializations
      window.addEventListener('DOMContentLoaded', () => {
        updateMET();
        updateTimeline();
        setInterval(updateMET, 1000);
        setInterval(updateTimeline, 60000); // 1 minute
    });
      // April 1st, 2026, 6:35pm EDT
      const missionStart = new Date('2026-04-01T18:35:00-04:00');

      const timelineContainer = document.getElementById('timeline-container');
      const timelineImage = document.getElementById('timeline-image');
      const timelineBar = document.getElementById('timeline-bar');
      const cursorOutput = document.getElementById('cursor-coords');
      const localTime = document.getElementById('local');
      const metTime = document.getElementById('met');
      const tliTime = document.getElementById('tli');

      // Cursor visibility toggle
      const showCursorCoords = false; // set false to hide cursor display
      cursorOutput.style.display = showCursorCoords ? 'block' : 'none';

      // Configurable X range in image coordinates (base reference)
      const lineXStartImage = 668;
      const lineXEndImage = 5150; // adjust to your FD image nominal width coordinates

      function updateContainerSize() {
        // Keep containers responsive. The image itself is 100% width.
        const containerWidth = cachedContainerWidth;
        const containerHeight = cachedContainerHeight || timelineContainer.clientHeight;

        const headerContainer = document.getElementById('header-container');
        const headerImage = document.getElementById('header-image');
        if (headerContainer && headerImage) {
          headerContainer.style.width = `100%`;
          headerImage.style.width = `100%`;
        }

        return containerWidth;
      }

      let cachedDisplayWidth = timelineImage.clientWidth;
      let cachedContainerWidth = timelineContainer.clientWidth;
      let cachedContainerHeight = 0;

      const imageObserver = new ResizeObserver(() => {
        cachedDisplayWidth = timelineImage.clientWidth;
      });
      const containerObserver = new ResizeObserver(() => {
        cachedContainerWidth = timelineContainer.clientWidth;
        cachedContainerHeight = timelineContainer.clientHeight;
      });

      imageObserver.observe(timelineImage);
      containerObserver.observe(timelineContainer);

      function imageToScreenX(imageX) {
        const naturalWidth = timelineImage.naturalWidth || 1763;
        const displayWidth = cachedDisplayWidth;
        if (displayWidth <= 0 || naturalWidth <= 0) {
          return imageX;
        }
        return (imageX * displayWidth) / naturalWidth;
      }

      function screenToImageX(screenX) {
        const naturalWidth = timelineImage.naturalWidth || 1763;
        const displayWidth = cachedDisplayWidth;
        if (displayWidth <= 0 || naturalWidth <= 0) {
          return screenX;
        }
        return (screenX * naturalWidth) / displayWidth;
      }

      timelineImage.addEventListener('load', () => {
        updateContainerSize();
        updateMET();
        updateTimeline();
      });

      window.addEventListener('resize', () => {
        updateContainerSize();
        updateTimeline();
      });

      function updateCursor(event) {
        cursorOutput.textContent = `Cursor: x=${event.clientX}, y=${event.clientY}`;
      }

      window.addEventListener('mousemove', updateCursor);

      let metSeconds = 0;
      const localTimeFormat = new Intl.DateTimeFormat('en-US', {
        year: 'numeric',
        month: 'short',
        day: 'numeric',
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit',
        hour12: true,
        timeZoneName: 'short'
      });
      let localTimeString = "";
      let tliTimeDate = new Date("2026-04-02T19:49:00-04:00");
      let tliString = `Trans-Lunar Injection (TLI): ${localTimeFormat.format(tliTimeDate)}`;
      tliTime.innerText = tliString;

      function updateMET() {
        // Update local time display
        const now = new Date();
        localTimeString = localTimeFormat.format(now);
        localTime.textContent = `Local Time: ${localTimeString}`;

        // Calculate MET (days/hours/minutes/seconds from mission start)
        const elapsed = now - missionStart;
        const totalSeconds = Math.floor(elapsed / 1000);
        metSeconds = totalSeconds;
        const days = Math.floor(totalSeconds / 86400);
        const hours = Math.floor((totalSeconds % 86400) / 3600);
        const minutes = Math.floor((totalSeconds % 3600) / 60);
        const seconds = totalSeconds % 60;
        const metString = `${days}/${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
        metTime.textContent = `MET: ${metString}`;
      }

      function updateTimeline() {
        const fdStartOffsetSeconds = -7 * 3600;
        const fdDurationSeconds = 24 * 3600;

        const fdIndex = Math.floor((metSeconds - fdStartOffsetSeconds) / fdDurationSeconds);
        const imageNum = fdIndex + 1;
        
        // Use padStart for cleaner string formatting
        const num_str = String(imageNum).padStart(2, '0');
        const imageName = `media/FD${num_str}.png`; // Space removed!

        // Only update the SRC if it has actually changed to prevent flickering
        if (!timelineImage.src.endsWith(imageName)) {
          timelineImage.src = imageName;
        }

        let progressInFD = (metSeconds - (fdStartOffsetSeconds + fdIndex * fdDurationSeconds)) / fdDurationSeconds;
        progressInFD = Math.min(Math.max(progressInFD, 0), 1);

        const imageX = lineXStartImage + progressInFD * (lineXEndImage - lineXStartImage);
        const screenX = imageToScreenX(imageX);

        timelineBar.style.left = `${screenX}px`;
      }

    </script>
  </body>
</html>
